<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --primary: #3498db; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); padding: 10px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 15px; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        tr:nth-child(even) { background: #f9f9f9; }
    </style>
</head>
<body>
<div id="passwordOverlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center;">
    <h3>Inventory Access</h3>
    <input type="password" id="passInput" placeholder="Password daaliye" style="padding:10px; margin-bottom:10px;">
    <button onclick="checkPass()" style="padding:10px 20px;">Open Inventory</button>
</div>

<div class="card">
    <h3 style="margin-top:0;">Inventory Entry</h3>
    <select id="storeSelect">
        <option value="Grocery">Grocery Store</option>
        <option value="Hardware">Hardware Store</option>
    </select>
    <input type="text" id="code" placeholder="Code">
    <input type="text" id="eng" placeholder="Item Name (English)">
    <input type="text" id="hin" placeholder="Item Name (Hindi)">
    <input type="text" id="cat" placeholder="Category">
    <input type="text" id="unit" placeholder="Unit">
    <input type="number" id="retail" placeholder="Retail Price">
    <input type="number" id="ws" placeholder="Wholesale Price">
    <button id="saveBtn" onclick="submitData()" style="background:#2ecc71; color:white;">Save Product</button>
</div>
    <div style="margin: 10px 0;">
    <button onclick="loadData()" style="background:#3498db; color:white; padding:8px 15px; border:none; border-radius:5px;">
        🔄 Refresh Table
    </button>
</div>

<div class="card" style="margin-top:20px;">
    <h3>Inventory List</h3>
    <div style="overflow-x:auto;"> <table id="invTable" style="width:100%; border-collapse: collapse; font-size: 13px;">
            <thead>
                <tr style="background:#eee;">
                    <th>Store</th><th>Code</th><th>Name</th><th>Retail</th>
                </tr>

            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>
</div>
<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbywGVvESanc5b17FyNL5rBpWn7ofXdj-NXu_xFby3KV0LiUNu-mCwjJWUmymYR1Npk_/exec";

    async function submitData() {
        const btn = document.getElementById('saveBtn');
        // Validation check
        let code = document.getElementById('code').value;
        if (!code) { alert("Code daalna zaroori hai!"); return; }

        btn.innerText = "Saving...";
        btn.disabled = true;

        let data = {
            store: document.getElementById('storeSelect').value,
            code: code,
            eng: document.getElementById('eng').value,
            hin: document.getElementById('hin').value,
            cat: document.getElementById('cat').value,
            unit: document.getElementById('unit').value,
            retail: document.getElementById('retail').value,
            ws: document.getElementById('ws').value
        };
        
        try {
            await fetch(WEB_APP_URL, { 
                method: "POST", 
                mode: 'no-cors', 
                body: JSON.stringify(data) 
            });
            alert("Saved Successfully!");
            // Form clear karna
            document.getElementById('code').value = "";
            document.getElementById('eng').value = "";
            document.getElementById('hin').value = "";
            document.getElementById('retail').value = "";
            document.getElementById('ws').value = "";
        } catch(e) {
            alert("Error hua!");
        } finally {
            btn.innerText = "Save Product";
            btn.disabled = false;
        }
    }
    
    // Page load hote hi check karein ki kya password pehle daal diya tha?
    window.onload = function() {
        if (sessionStorage.getItem("isLoggedIn") === "true") {
            document.getElementById('passwordOverlay').style.display = 'none';
        }
        loadData(); // Data load karein
    };


    function checkPass() {
        let pass = document.getElementById('passInput').value;
        // Yahan apna password rakhein (Example: 1234)
        if (pass === "smi2026") { 
            document.getElementById('passwordOverlay').style.display = 'none';
        } else {
            alert("Galat Password!");
        }
    }

    // Ye function page load hote hi aur entry save hone ke baad chalega
    async function loadData() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "<tr><td colspan='4'>Loading...</td></tr>";

        try {
            let res = await fetch(WEB_APP_URL);
            let data = await res.json();
            
            let html = "";
            // Header skip karne ke liye i=1 se start kiya
            for (let i = 1; i < data.length; i++) {
                let row = data[i];
                html += `<tr>
                    <td>${row[0]}</td>
                    <td>${row[1]}</td>
                    <td>${row[2]}</td>
                    <td>₹${row[6]}</td>
                </tr>`;
            }
            tbody.innerHTML = html;
        } catch(e) {
            tbody.innerHTML = "<tr><td colspan='4'>Error loading data</td></tr>";
        }
    }

    // Load function ko window onload mein daal dein
    window.onload = loadData;
</script>
