    async function submitData() {
    const btn = document.getElementById('saveBtn');
    let code = document.getElementById('code').value;
    if (!code) { alert("Code daalna zaroori hai!"); return; }

    btn.innerText = "Saving...";
    btn.disabled = true;

    // Yahan hum 'targetSheet' add kar rahe hain
    let selectedStore = document.getElementById('storeSelect').value; 
    
    let data = {
        targetSheet: selectedStore, // Ye "Grocery" ya "Hardware" hoga
        store: selectedStore,
        code: code,
        eng: document.getElementById('eng').value,
        hin: document.getElementById('hin').value,
        cat: document.getElementById('cat').value,
        unit: document.getElementById('unit').value,
        retail: document.getElementById('retail').value,
        ws: document.getElementById('ws').value
    };
    
    try {
        await fetch(WEB_APP_URL, { 
            method: "POST", 
            body: JSON.stringify(data) // 'no-cors' hata dein agar aapko response check karna hai
        });
        alert("Saved Successfully!");
        // Clear form
        document.getElementById('code').value = "";
        loadData(); // Table refresh
    } catch(e) {
        alert("Error hua: " + e);
    } finally {
        btn.innerText = "Save Product";
        btn.disabled = false;
    }
}

    async function loadData() {
    let filter = document.getElementById('filterSelect').value;
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = "<tr><td colspan='5'>Loading...</td></tr>";

    try {
        let res = await fetch(WEB_APP_URL);
        let result = await res.json();
        
        // Safety Check: agar data na ho toh empty array use karein
        let groceryData = result.grocery || [];
        let hardwareData = result.hardware || [];
        
        let html = "";

        // GROCERY
        if (filter === "All" || filter === "Grocery") {
            for (let i = 1; i < groceryData.length; i++) {
                let row = groceryData[i];
                html += `<tr><td>${row[0]}</td><td>${row[1]}</td><td>${row[2]}</td><td>₹${row[6]}</td>
                <td><button onclick="editRow(${i + 1}, 'Grocery')">✏️</button>
                    <button onclick="deleteRow(${i + 1}, 'Grocery')" style="background:red; color:white;">❌</button></td></tr>`;
            }
        }

        // HARDWARE
        if (filter === "All" || filter === "Hardware") {
            for (let i = 1; i < hardwareData.length; i++) {
                let row = hardwareData[i];
                html += `<tr><td>${row[0]}</td><td>${row[1]}</td><td>${row[2]}</td><td>₹${row[6]}</td>
                <td><button onclick="editRow(${i + 1}, 'Hardware')">✏️</button>
                    <button onclick="deleteRow(${i + 1}, 'Hardware')" style="background:red; color:white;">❌</button></td></tr>`;
            }
        }
        
        tbody.innerHTML = html.length > 0 ? html : "<tr><td colspan='5'>Koi data nahi mila</td></tr>";
    } catch(e) {
        tbody.innerHTML = "<tr><td colspan='5'>Error: " + e.message + "</td></tr>";
        console.log("Error details:", e); // Console mein error dekhein
    }
}

// DELETE FUNCTION
async function deleteRow(rowIndex, targetSheet) {
    if (confirm("Kya aap sach mein ise delete karna chahte hain?")) {
        let btn = event.target;
        btn.innerText = "Deleting...";
        await fetch(WEB_APP_URL, {
            method: "POST",
            body: JSON.stringify({ action: "delete", rowIndex: rowIndex, targetSheet: targetSheet })
        });
        loadData(); // Table refresh
    }
}

// EDIT FUNCTION - Data form mein wapas lane ke liye
function editRow(rowIndex, targetSheet) {
    editRowIndex = rowIndex;
    // Yahan hum row ka data uthakar form mein daal rahe hain
    // Note: Table ki cells se data fetch kar rahe hain
    let row = event.target.closest("tr").cells;
    document.getElementById('code').value = row[1].innerText;
    document.getElementById('eng').value = row[2].innerText;
    
    // Save button ko "Update" bana rahe hain
    let btn = document.getElementById('saveBtn');
    btn.innerText = "Update Item";
    btn.onclick = updateData; // Naya function call karein
}

// UPDATE FUNCTION
async function updateData() {
    let data = {
        action: "update",
        rowIndex: editRowIndex,
        targetSheet: document.getElementById('storeSelect').value,
        store: document.getElementById('storeSelect').value,
        code: document.getElementById('code').value,
        eng: document.getElementById('eng').value,
        hin: document.getElementById('hin').value,
        retail: document.getElementById('retail').value,
        ws: document.getElementById('ws').value
    };
    
    await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify(data) });
    alert("Updated Successfully!");
    
    // Wapas "Save" mode mein aayein
    location.reload(); 
}

    // Load function ko window onload mein daal dein
    window.onload = loadData;
