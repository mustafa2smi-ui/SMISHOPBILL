<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    input, select { display: block; width: 100%; margin: 10px 0; padding: 8px; }
    button { padding: 10px; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
  </style>
</head>
<body>
  <h2>SMI Grocery & Hardware Inventory Entry/Edit Webapp</h2>
  <select id="storeSelect"><option value="Sheet1">Grocery</option><option value="Sheet3">Hardware</option></select>
  <input type="text" id="code" placeholder="Code">
  <input type="text" id="eng" placeholder="Eng Name">
  <input type="text" id="hin" placeholder="Hin Name">
  <input type="text" id="cat" placeholder="Category">
  <input type="text" id="unit" placeholder="Unit">
  <input type="number" id="retail" placeholder="Retail">
  <input type="number" id="ws" placeholder="Wholesale">
  <button id="saveBtn" onclick="saveItem()">Submit</button>

  <hr>
  <button onclick="loadTable()">Refresh Table</button>
  <table id="invTable"><thead><tr><th>Code</th><th>Eng</th><th>Hin</th><th>Retail</th><th>WS</th><th>Action</th></tr></thead><tbody id="tableBody"></tbody></table>

  <script>
    let editRow = null;
    let allData = { grocery: [], hardware: [] };

    async function loadTable() {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = "Loading...";
      let data = await google.script.run.withSuccessHandler(res => {
        allData = res;
        let html = "";
        // Grocery Data
        res.grocery.slice(1).forEach((r, i) => html += rowHtml(r, i+2, 'Sheet1'));
        // Hardware Data
        res.hardware.slice(1).forEach((r, i) => html += rowHtml(r, i+2, 'Sheet3'));
        tbody.innerHTML = html;
      }).getInventoryData();
    }

    function rowHtml(r, idx, sheet) {
      return `<tr><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td><td>${r[6]}</td><td>${r[7]}</td>
              <td><button onclick="edit(${idx}, '${sheet}')">✏️</button><button onclick="del(${idx}, '${sheet}')">❌</button></td></tr>`;
    }

    async function saveItem() {
      let data = {
        action: editRow ? "update" : "add",
        rowIndex: editRow,
        targetSheet: document.getElementById('storeSelect').value,
        store: document.getElementById('storeSelect').value,
        code: document.getElementById('code').value,
        eng: document.getElementById('eng').value,
        hin: document.getElementById('hin').value,
        cat: document.getElementById('cat').value,
        unit: document.getElementById('unit').value,
        retail: document.getElementById('retail').value,
        ws: document.getElementById('ws').value
      };
      await google.script.run.withSuccessHandler(() => { alert("Done!"); loadTable(); }).processData(data);
    }

    function edit(idx, sheet) {
      let data = (sheet === "Sheet1") ? allData.grocery : allData.hardware;
      let r = data[idx-1];
      document.getElementById('code').value = r[1];
      document.getElementById('eng').value = r[2];
      document.getElementById('hin').value = r[3];
      document.getElementById('cat').value = r[4];
      document.getElementById('unit').value = r[5];
      document.getElementById('retail').value = r[6];
      document.getElementById('ws').value = r[7];
      editRow = idx;
      document.getElementById('saveBtn').innerText = "Update";
    }

    function del(idx, sheet) {
      if(confirm("Delete?")) google.script.run.withSuccessHandler(loadTable).processData({action: "delete", rowIndex: idx, targetSheet: sheet});
    }

    loadTable();
  </script>
</body>
</html>
