<!DOCTYPE html>
<html>
<head>
<title>SMI Inventory</title>

<style>
body {
  font-family: Arial;
  padding: 10px;
  background: #f5f5f5;
}

h2 {
  text-align: center;
  color: green;
}

.container {
  background: #fff;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 0 10px #ccc;
}

input, select {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
}

button {
  padding: 8px 12px;
  margin: 5px 2px;
  border: none;
  background: green;
  color: white;
  border-radius: 5px;
}

.deleteBtn {
  background: red;
}

.updateBtn {
  background: orange;
}

table {
  width: 100%;
  margin-top: 10px;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #ddd;
  padding: 6px;
  text-align: center;
}
</style>

</head>
<body>

<div class="container">

<h2>SMI Grocery & Hardware Inventory Entry/Edit Webapp</h2>

<!-- SELECT STORE -->
<select id="store">
  <option value="sheet1">Grocery</option>
  <option value="sheet2">Hardware</option>
</select>

<input id="code" placeholder="Code">
<input id="eng" placeholder="Eng Name">
<input id="hin" placeholder="Hin Name">
<input id="cat" placeholder="Category">
<input id="unit" placeholder="Unit">
<input id="retail" placeholder="Retail">
<input id="wholesale" placeholder="Wholesale">

<button onclick="submitData()">Submit / Update</button>

<hr>

<h3>Live Table</h3>
<button onclick="loadData()">Refresh</button>

<table>
<thead>
<tr>
<th>Code</th>
<th>Eng</th>
<th>Hin</th>
<th>Retail</th>
<th>Wholesale</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbw6MUqfpMw1wyK8-WAT_mhDbXSVjZ-fk6npHXTx47-FcdoFubyasFPmQu5t4ceV8fJ4ug/exec";

// LOAD DATA
function loadData() {
  let store = document.getElementById("store").value;

  fetch(API_URL + "?store=" + store)
  .then(res => res.json())
  .then(data => {

    let tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    data.forEach(item => {

      tbody.innerHTML += `
      <tr>
        <td>${item.code}</td>
        <td>${item.eng}</td>
        <td>${item.hin}</td>
        <td>${item.retail}</td>
        <td>${item.wholesale}</td>
        <td>
          <button class="updateBtn" onclick='editData(${JSON.stringify(item)})'>Edit</button>
          <button class="deleteBtn" onclick='deleteData(${item.row})'>Delete</button>
        </td>
      </tr>
      `;
    });
  });
}


// SUBMIT / UPDATE
let editRow = null;

function submitData() {

  let data = {
    store: document.getElementById("store").value,
    code: document.getElementById("code").value,
    eng: document.getElementById("eng").value,
    hin: document.getElementById("hin").value,
    cat: document.getElementById("cat").value,
    unit: document.getElementById("unit").value,
    retail: document.getElementById("retail").value,
    wholesale: document.getElementById("wholesale").value,
    row: editRow,
    action: editRow ? "update" : "add"
  };

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(() => {
    alert("Saved");
    clearForm();
    loadData();
  });
}


// EDIT
function editData(item) {
  document.getElementById("code").value = item.code;
  document.getElementById("eng").value = item.eng;
  document.getElementById("hin").value = item.hin;
  document.getElementById("cat").value = item.cat;
  document.getElementById("unit").value = item.unit;
  document.getElementById("retail").value = item.retail;
  document.getElementById("wholesale").value = item.wholesale;

  editRow = item.row;
}


// DELETE
function deleteData(row) {
  if(confirm("Delete item?")) {

    fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "delete",
        row: row,
        store: document.getElementById("store").value
      })
    })
    .then(() => {
      alert("Deleted");
      loadData();
    });
  }
}


// CLEAR FORM
function clearForm() {
  document.getElementById("code").value = "";
  document.getElementById("eng").value = "";
  document.getElementById("hin").value = "";
  document.getElementById("cat").value = "";
  document.getElementById("unit").value = "";
  document.getElementById("retail").value = "";
  document.getElementById("wholesale").value = "";

  editRow = null;
}


// INIT
loadData();

</script>

</body>
</html>
