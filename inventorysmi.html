<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    input, select { display: block; width: 100%; margin: 10px 0; padding: 8px; }
    button { padding: 10px; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
  </style>
</head>
<body>
  <h2>SMI Grocery & Hardware Inventory Entry/Edit Webapp</h2>
  <select id="storeSelect"><option value="Sheet1">Grocery</option><option value="Sheet3">Hardware</option></select>
  <input type="text" id="code" placeholder="Code">
  <input type="text" id="eng" placeholder="Eng Name">
  <input type="text" id="hin" placeholder="Hin Name">
  <input type="text" id="cat" placeholder="Category">
  <input type="text" id="unit" placeholder="Unit">
  <input type="number" id="retail" placeholder="Retail">
  <input type="number" id="ws" placeholder="Wholesale">
  <button id="saveBtn" onclick="saveItem()">Submit</button>

  <hr>
  <button onclick="loadTable()">Refresh Table</button>
  <table id="invTable"><thead><tr><th>Code</th><th>Eng</th><th>Hin</th><th>Retail</th><th>WS</th><th>Action</th></tr></thead><tbody id="tableBody"></tbody></table>

  <script>
    <select id="storeSelect">
    <option value="Sheet1">Grocery (Sheet1)</option>
    <option value="Sheet3">Hardware (Sheet3)</option>
</select>
<input type="text" id="code" placeholder="Code">
<input type="text" id="eng" placeholder="Eng Name">
<input type="text" id="hin" placeholder="Hin Name">
<input type="text" id="cat" placeholder="Category">
<input type="text" id="unit" placeholder="Unit">
<input type="number" id="retail" placeholder="Retail">
<input type="number" id="ws" placeholder="Wholesale">
<button id="saveBtn" onclick="saveItem()">Submit</button>

<script>
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxs_ucv9_7cbOXt_9Q4M_aTiUqNbR0MApp30ACJmsYFDtSuTRi1AwVSeEyDYt_cXMlm7Q/exec";
  let editRow = null;
  let allData = { sheet1: [], sheet3: [] };

  async function loadTable() {
    let res = await fetch(WEB_APP_URL);
    allData = await res.json();
    let html = "";
    // Sheet1 (i+2 isliye kyunki header 1 pe hai aur array 0 se shuru hota hai)
    allData.sheet1.slice(1).forEach((r, i) => html += rowHtml(r, i+2, 'Sheet1'));
    allData.sheet3.slice(1).forEach((r, i) => html += rowHtml(r, i+2, 'Sheet3'));
    document.getElementById('tableBody').innerHTML = html;
  }

  function rowHtml(r, idx, sheet) {
    return `<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[5]}</td><td>${r[6]}</td>
            <td><button onclick="edit(${idx}, '${sheet}')">✏️</button><button onclick="del(${idx}, '${sheet}')">❌</button></td></tr>`;
  }

  async function saveItem() {
    let data = {
      action: editRow ? "update" : "add",
      rowIndex: editRow,
      targetSheet: document.getElementById('storeSelect').value,
      code: document.getElementById('code').value,
      eng: document.getElementById('eng').value,
      hin: document.getElementById('hin').value,
      cat: document.getElementById('cat').value,
      unit: document.getElementById('unit').value,
      retail: document.getElementById('retail').value,
      ws: document.getElementById('ws').value
    };
    await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify(data) });
    alert("Saved!");
    editRow = null;
    document.getElementById('saveBtn').innerText = "Submit";
    loadTable();
  }

  function edit(idx, sheet) {
    let data = (sheet === "Sheet1") ? allData.sheet1 : allData.sheet3;
    let r = data[idx-1];
    document.getElementById('code').value = r[0];
    document.getElementById('eng').value = r[1];
    document.getElementById('hin').value = r[2];
    document.getElementById('cat').value = r[3];
    document.getElementById('unit').value = r[4];
    document.getElementById('retail').value = r[5];
    document.getElementById('ws').value = r[6];
    editRow = idx;
    document.getElementById('saveBtn').innerText = "Update";
  }

  async function del(idx, sheet) {
    if(confirm("Delete?")) {
      await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify({ action: "delete", rowIndex: idx, targetSheet: sheet }) });
      loadTable();
    }
  }
  </script>
</body>
</html>
