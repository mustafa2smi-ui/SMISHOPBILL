<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Khan Shop Pro - Smart Billing</title>
    <style>
        :root { --p: #27ae60; --s: #2ecc71; --d: #2c3e50; --err: #e74c3c; --border: 2px solid black; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background: #f4f7f6; 
            height: 100vh; 
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- LAYOUT WRAPPERS --- */
        #loginPage, #billingPage {
            height: 100vh;
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        /* --- STICKY TOP SECTION --- */
        .top-fixed-area {
            flex-shrink: 0;
            background: #f4f7f6;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 2000;
        }

        .header { 
            background: var(--p); 
            color: white; 
            padding: 10px; 
            text-align: center; 
            border-bottom: var(--border); 
            position: relative;
        }
        
        .shop-name { font-size: 18px; font-weight: bold; }

        .store-selector { 
            display: flex; 
            justify-content: center; 
            gap: 8px; 
            margin-top: 5px; 
        }
        
        .store-btn { 
            padding: 5px 12px; 
            border-radius: 10px; 
            border: 1px solid white; 
            background: transparent; 
            color: white; 
            font-size: 11px;
        }
        
        .store-active { background: white; color: var(--p); font-weight: bold; }

        .sticky-controls {
            background: white;
            padding: 10px 0;
            border-bottom: var(--border);
        }

        .mode-switcher {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .cat-bar { 
            display: flex; 
            overflow-x: auto; 
            gap: 10px; 
            padding: 0 10px 5px 10px; 
            scrollbar-width: none; 
        }
        
        .cat-bar::-webkit-scrollbar { display: none; }

        .cat-btn { 
            background: #eee; 
            padding: 8px 15px; 
            border-radius: 15px; 
            border: 1px solid black; 
            white-space: nowrap; 
            font-size: 12px; 
            font-weight: bold;
        }
        
        .cat-active { background: var(--d); color: white; }

        /* --- SCROLLABLE CONTENT --- */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 260px; /* Space for fixed footer */
        }

        .grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            padding: 10px; 
        }

        .p-card { 
            background: white; 
            padding: 12px; 
            border-radius: 12px; 
            border: 2px solid #e74c3c !important; 
            box-shadow: none !important;
            text-align: center; 
        }

        /* --- FIXED FOOTER BILL --- */
        .footer-bill { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            background: white; 
            border-top: var(--border);
            border-radius: 20px 20px 0 0; 
            z-index: 3000;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.1);
        }

        .bill-items { 
            max-height: 100px; 
            overflow-y: auto; 
            margin: 8px; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            background: #fafafa; 
        }

        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 5px; border-bottom: 1px solid #eee; font-size: 13px; }
        
        .action-bar { 
            display: flex; 
            justify-content: space-evenly; 
            padding: 8px 5px; 
            background: #fff;
            gap: 5px;
        }

        .round-btn { 
            width: 42px; 
            height: 42px; 
            border-radius: 50%; 
            border: var(--border); 
            color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 18px;
            box-shadow: 0 3px 0px black;
        }

        .round-btn:active { transform: translateY(2px); box-shadow: none; }
    </style>
</head>
<body>

<div id="loginPage">
    <header style="background: var(--p); color: white; padding: 20px; text-align: center; border-bottom: 5px solid #1e8449; flex-shrink: 0;">
        <h1 style="margin: 0; font-size: 20px;">A R SON'S GENERAL STORE</h1>
        <p style="margin: 5px 0 0; font-size: 12px;">Digital Billing System</p>
    </header>

    <div style="flex: 1; overflow-y: auto; padding: 15px;">
        <div style="background: white; padding: 15px; border-radius: 12px; border: var(--border); box-shadow: 0 4px 0 black; margin-bottom: 20px;">
            <h3 style="margin: 0 0 10px 0; font-size: 16px;">Staff Login</h3>
            <input type="email" id="emailInput" placeholder="example@gmail.com" 
                   style="width: 100%; padding: 12px; border: var(--border); border-radius: 8px; box-sizing: border-box;">
            <button onclick="handleLogin()" id="loginBtn"
                    style="width: 100%; background: var(--p); color: white; padding: 14px; border: var(--border); border-radius: 8px; margin-top: 12px; font-weight: bold;">
                ENTER SYSTEM
            </button>
            <div id="loginMsg" style="margin-top: 10px; font-size: 12px; text-align: center;"></div>
        </div>

        <div style="background: #fff8e1; border: 1px solid #ffe082; padding: 12px; border-radius: 8px; font-size: 13px;">
            <h4 style="margin: 0 0 5px 0; color: #f57c00;">⚠️ डेटा रिफ्रेश कैसे करें?</h4>
            <p style="margin: 0;">Chrome Settings > Privacy > Clear Browsing Data > Cached images and files (Clear data).</p>
        </div>
    </div>

    <footer style="background: var(--d); color: white; padding: 15px; text-align: center; font-size: 10px;">
        A R Son's Mailawada | Version 1.0
    </footer>
</div>

<div id="billingPage" style="display:none;">
    <div class="top-fixed-area">
        <div class="header">
            <button onclick="goHome()" style="position: absolute; left: 10px; top: 12px; background:none; border:none; color:white; font-size:20px;">🏠</button>
            <span class="shop-name">AR Son's & SMI STORE</span>
            <div class="store-selector">
                <button id="btnG" class="store-btn store-active" onclick="switchStore('Grocery')">GROCERY</button>
                <button id="btnH" class="store-btn" onclick="switchStore('Hardware')">HARDWARE</button>
            </div>
        </div>
        <div class="sticky-controls">
            <div class="mode-switcher">
                <button id="rtBtn" class="cat-btn cat-active" onclick="setMode('retail')">RETAIL</button>
                <button id="wsBtn" class="cat-btn" onclick="setMode('ws')">WHOLESALE</button>
            </div>
            <div id="catBar" class="cat-bar"></div>
        </div>
        <div style="padding: 8px 10px; background: #fff;">
            <input type="text" id="custName" placeholder="Customer Name (नाम लिखें)" style="width:100%; padding:10px; border:var(--border); border-radius:8px; box-sizing: border-box;">
        </div>
    </div>

    <div class="main-content">
        <div id="prodGrid" class="grid"></div>
    </div>

    <div class="footer-bill">
        <div id="billItems" class="bill-items"></div>
        
        <div class="action-bar">
            <button class="round-btn" style="background:#3498db" onclick="printBill()">🖨️</button>
            <button class="round-btn" style="background:#8e44ad" onclick="openCalculator()">🧮</button> 
            <button class="round-btn" style="background:#f39c12" onclick="downloadCSV()">📊</button>
            <button class="round-btn" style="background:#25D366" onclick="shareBill()">🔗</button>
            <button class="round-btn" style="background:var(--err)" onclick="clearBill()">❌</button>
        </div>

        <div style="background: white; border-top: 2px solid var(--d);">
            <div style="padding: 5px 10px; background: #f9f9f9; border-bottom: 1px solid #ddd; display: flex; gap: 8px;">
                <input type="number" id="prevBal" placeholder="Pichla Baqi" value="0" oninput="calculateFinal()" 
                       style="flex: 1; padding: 6px; border: 1px solid #999; text-align: right; border-radius: 4px; font-size: 13px;">
                <input type="number" id="paidAmt" placeholder="Aaj Jama" value="0" oninput="calculateFinal()" 
                       style="flex: 1; padding: 6px; border: 1px solid #999; text-align: right; border-radius: 4px; color: green; font-weight: bold; font-size: 13px;">
            </div>

            <div style="padding: 8px 10px; background: var(--d); color: white;">
                <div style="display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 3px;">
                    <span>Bill: <span id="grandTotal">₹0.00</span></span>
                    <span id="shopLabel" style="text-transform: uppercase;">MODE</span>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 3px;">
                    <b style="font-size: 13px;">NET BAL:</b>
                    <b id="finalBalance" style="font-size: 16px; color: #2ecc71;">₹0.00</b>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
