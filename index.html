<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Khan Shop Pro - Smart Billing</title>
    <style>
        :root { --p: #27ae60; --s: #2ecc71; --d: #2c3e50; --err: #e74c3c; --border: 2px solid black; }
        
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; padding-bottom: 300px; }

        /* --- STICKY TOP SECTION --- */
        .top-fixed-area {
            position: sticky;
            top: 0;
            z-index: 2000;
            background: #f4f7f6;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .header { 
            background: var(--p); 
            color: white; 
            padding: 10px; 
            text-align: center; 
            border-bottom: var(--border); 
        }
        
        .shop-name { font-size: 20px; font-weight: bold; }

        .store-selector { 
            display: flex; 
            justify-content: center; 
            gap: 8px; 
            margin-top: 5px; 
        }
        
        .store-btn { 
            padding: 5px 12px; 
            border-radius: 10px; 
            border: 1px solid white; 
            background: transparent; 
            color: white; 
            font-size: 11px;
            cursor: pointer;
        }
        
        .store-active { background: white; color: var(--p); font-weight: bold; }

        /* Mode & Category Bar (Also Sticky) */
        .sticky-controls {
            background: white;
            padding: 10px 0;
            border-bottom: var(--border);
        }

        .mode-switcher {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .cat-bar { 
            display: flex; 
            overflow-x: auto; 
            gap: 10px; 
            padding: 0 10px 5px 10px; 
            scrollbar-width: none; 
        }
        
        .cat-bar::-webkit-scrollbar { display: none; }

        .cat-btn { 
            background: #eee; 
            padding: 8px 15px; 
            border-radius: 15px; 
            border: 1px solid black; 
            white-space: nowrap; 
            font-size: 12px; 
            font-weight: bold;
        }
        
        .cat-active { background: var(--d); color: white; }

        /* --- SCROLLABLE CONTENT --- */
        .grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            padding: 15px 10px; 
        }

        .p-card { 
            background: white; 
            padding: 12px; 
            border-radius: 12px; 
            border: var(--border); 
            box-shadow: 0 4px 0px black; 
            text-align: center; 
        }
        
        .p-card:active { transform: translateY(2px); box-shadow: none; }

        /* --- FIXED FOOTER BILL --- */
        .footer-bill { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            background: white; 
            border-top: var(--border);
            border-radius: 25px 25px 0 0; 
            z-index: 3000;
        }

        .bill-items { 
            max-height: 140px; 
            overflow-y: auto; 
            margin: 10px; 
            border: var(--border); 
            border-radius: 10px; 
            background: #fafafa; 
        }
.item-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #ddd; }
        .item-row:last-child { border-bottom: none; }
        
        .total-strip { 
            background: var(--d); 
            color: white; 
            padding: 12px 20px; 
            display: flex; 
            justify-content: space-between; 
            font-weight: bold; 
        }

        .action-bar { 
            display: flex; 
            justify-content: space-around; 
            padding: 10px; 
        }

        .round-btn { 
            width: 45px; 
            height: 45px; 
            border-radius: 50%; 
            border: var(--border); 
            color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 3px 0px black;
        }

        .round-btn:active { transform: translateY(2px); box-shadow: none; }
    </style>
</head>
<body>

<div id="loginPage" style="padding-top:100px; text-align:center;">
    <div style="background:white; padding:30px; margin:20px; border-radius:20px; border:var(--border);">
        <h2 style="color:var(--p)">KHAN SHOP LOGIN</h2>
        <input type="email" id="emailInput" placeholder="Email Address" style="width:100%; padding:12px; border:var(--border); border-radius:10px;">
        <button onclick="handleLogin()" style="width:100%; background:var(--p); color:white; padding:15px; border:var(--border); border-radius:10px; margin-top:15px; font-weight:bold;">VERIFY</button>
        <div id="loginMsg" style="margin-top:10px;"></div>
    </div>
</div>

<div id="billingPage" style="display:none;">
    <div class="top-fixed-area">
        <div class="header">
            <span class="shop-name">SMI KIRANA & HARDWARE</span>
            <div class="store-selector">
                <button id="btnG" class="store-btn store-active" onclick="switchStore('Grocery')">GROCERY</button>
                <button id="btnH" class="store-btn" onclick="switchStore('Hardware')">HARDWARE</button>
            </div>
        </div>
        
        <div class="sticky-controls">
            <div class="mode-switcher">
                <button id="rtBtn" class="cat-btn cat-active" onclick="setMode('retail')">RETAIL</button>
                <button id="wsBtn" class="cat-btn" onclick="setMode('ws')">WHOLESALE</button>
            </div>
            <div id="catBar" class="cat-bar"></div>
        </div>
    </div>

    <div class="cust-info" style="padding:10px;">
        <input type="text" id="custName" placeholder="Customer Name (नाम लिखें)" style="width:100%; padding:10px; border:var(--border); border-radius:8px;">
    </div>

    <div id="prodGrid" class="grid"></div>

    <div class="footer-bill">
        <div id="billItems" class="bill-items"></div>
        
        <div class="action-bar">
            <button class="round-btn" style="background:#3498db" onclick="printBill()">🖨️</button>
            <button class="round-btn" style="background:#f39c12" onclick="downloadCSV()">📊</button>
            <button class="round-btn" style="background:#25D366" onclick="shareBill()">🔗</button>
            <button class="round-btn" style="background:var(--err)" onclick="clearBill()">❌</button>
        </div>
        <div class="total-strip">
            <span id="grandTotal">TOTAL: ₹0</span>
            <span id="shopLabel" style="font-size:11px;">GROCERY</span>
        </div>
    </div>
</div>
<script>
  /*const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwEf_fDwLfESUew5Sr8iBNF_cdcTb_Boz6ud9LqvHEU9VHN0RtwfimwmMPCUSOEN3uMhQ/exec";
  */
  let groceryInv = [], hardwareInv = [], inventory = [], cart = {};
  let mode = 'retail', selectedCat = 'All', currentStore = 'Grocery';
  let printerDevice = null;

  // 1. APP INITIALIZATION (Offline First)
  window.onload = () => {
    const savedEmail = localStorage.getItem('khan_shop_email');
    const savedStatus = localStorage.getItem('khan_shop_status');
    const localG = localStorage.getItem('offline_grocery');
    const localH = localStorage.getItem('offline_hardware');
    
    if(savedEmail && savedStatus === "allow" && localG && localH) {
        groceryInv = JSON.parse(localG);
        hardwareInv = JSON.parse(localH);
        
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('billingPage').style.display = 'block';
        document.getElementById('emailInput').value = savedEmail;
        
        switchStore('Grocery'); 
        handleLogin(true); // Silent sync in background
    }
  };
  // 2. LOGIN & SYNC LOGIC
  async function handleLogin(isSilent = false) {
    const emailInput = document.getElementById('emailInput');
    const email = emailInput.value.toLowerCase().trim();
   /* if(!email) return;*/
const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if(!emailRegex.test(email)) {
        document.getElementById('loginMsg').innerHTML = "<span style='color:red'>Sahi Email format likhein!</span>";
        return;
    }
    if(!isSilent) document.getElementById('loginMsg').innerText = "Checking Access & Syncing...";
    
    const finalUrl = `${SCRIPT_URL}?email=${encodeURIComponent(email)}`;
    
    try {
      const response = await fetch(finalUrl);
      const data = await response.json();
      let currentStatus = data.status.toLowerCase().trim();

      if(currentStatus === "allow") {
        localStorage.setItem('khan_shop_email', email);
        localStorage.setItem('khan_shop_status', "allow");
        localStorage.setItem('offline_grocery', JSON.stringify(data.grocery));
        localStorage.setItem('offline_hardware', JSON.stringify(data.hardware));

        groceryInv = data.grocery;
        hardwareInv = data.hardware;
        
        if(!isSilent) {
          document.getElementById('loginPage').style.display = 'none';
          document.getElementById('billingPage').style.display = 'block';
          switchStore('Grocery');
        } else {
          switchStore(currentStore);
        }
      } else {
        localStorage.removeItem('khan_shop_status');
        if(!isSilent) {
            document.getElementById('loginMsg').innerHTML = 
            `<span style="color:orange; font-weight:bold;">Status: ${data.status}</span><br>
             Admin se 'Allow' karwayein aur Refresh karein.`;
        }
      }
    } catch(e) {
      console.log("Offline Mode Active.");
      if(!isSilent) document.getElementById('loginMsg').innerHTML = `<span style="color:red">Net Connection Error!</span>`;
    }
  }

  // 3. STORE & GRID LOGIC
  function switchStore(store) {
    currentStore = store;
    inventory = (store === 'Grocery') ? groceryInv : hardwareInv;
    
    document.getElementById('btnG').classList.toggle('store-active', store === 'Grocery');
    document.getElementById('btnH').classList.toggle('store-active', store === 'Hardware');
    document.getElementById('shopLabel').innerText = store.toUpperCase();
    
    selectedCat = 'All';
    renderCats();
    renderGrid();
  }

  function renderCats() {
    const cats = ['All', ...new Set(inventory.map(i => i.cat))];
    document.getElementById('catBar').innerHTML = cats.map(c => `
      <div class="cat-btn ${selectedCat === c ? 'cat-active' : ''}" onclick="filterCat('${c}')">${c}</div>
    `).join('');
  }

  function filterCat(c) { selectedCat = c; renderCats(); renderGrid(); }

  function renderGrid() {
    const grid = document.getElementById('prodGrid');
    const filtered = selectedCat === 'All' ? inventory : inventory.filter(i => i.cat === selectedCat);
    grid.innerHTML = filtered.map(i => `
      <div class="p-card" onclick="addToCart('${i.code}')">
        <strong>${i.eng}</strong>
        <small>(${i.hin})</small><br>
        <span style="color:var(--p); font-weight:bold;">₹${mode === 'retail' ? i.retail : i.ws}</span>
      </div>
    `).join('');
  }

  function setMode(m) {
    mode = m;
    document.getElementById('rtBtn').classList.toggle('cat-active', m==='retail');
    document.getElementById('wsBtn').classList.toggle('cat-active', m==='ws');
    renderGrid(); 
    updateBill();
  }

  // 4. CART & BILLING LOGIC
  function addToCart(code) {
    if(cart[code]) cart[code].qty++;
    else {
      const p = inventory.find(i => i.code == code);
      cart[code] = { ...p, qty: 1 };
    }
    updateBill();
    const box = document.getElementById('billItems');
    setTimeout(() => { box.scrollTop = box.scrollHeight; }, 100);
  }

  function updateQty(code, d) {
    if(cart[code]) {
      cart[code].qty += d;
      if(cart[code].qty <= 0) delete cart[code];
      updateBill();
    }
  }

  function clearBill() {
    if(confirm("Clear current bill?")) { cart = {}; document.getElementById('custName').value = ""; updateBill(); }
  }
  function editQty(code) {
    let newQty = prompt("Enter Quantity (e.g. 0.5 or 1.5):", cart[code].qty);
    if (newQty !== null && !isNaN(newQty) && newQty > 0) {
        cart[code].qty = parseFloat(newQty);
        updateBill();
    } else if (newQty == 0) {
        delete cart[code];
        updateBill();
    }
}
  function updateBill() {
    const container = document.getElementById('billItems');
    let total = 0;
    container.innerHTML = "";
    for(let key in cart) {
      let item = cart[key];
      let rate = mode === 'retail' ? item.retail : item.ws;
      let sub = item.qty * rate;
      total += sub;
      container.innerHTML += `
        <div class="item-row">
          <div style="flex:1"><b>${item.eng}</b><br><small>${item.hin}</small></div>
          <div style="display:flex; align-items:center; gap:10px;">
            <button class="qty-btn" onclick="updateQty('${key}', -1)">-</button>
            <b>${item.qty}</b>
            <button class="qty-btn" onclick="updateQty('${key}', 1)">+</button>
          </div>
          <div style="width:70px; text-align:right;">₹${sub}</div>
        </div>`;
    }
    document.getElementById('grandTotal').innerText = "TOTAL: ₹" + total;
  }
  // 5. PRINTER & SHARING
  async function printBill() {
    if (Object.keys(cart).length === 0) return alert("Pehle Bill mein items add karein!");
    try {
        if (!printerDevice) {
            printerDevice = await navigator.bluetooth.requestDevice({
                filters: [{ namePrefix: 'Bluetooth' }, { namePrefix: 'SRS' }, { namePrefix: 'MPT' }, { namePrefix: 'MTP' }],
                optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb']
            });
        }
        const server = await printerDevice.gatt.connect();
        const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
        const characteristic = await service.getCharacteristic('00002af1-0000-1000-8000-00805f9b34fb');

        const custName = document.getElementById('custName').value || "Cash Customer";
        const totalAmt = document.getElementById('grandTotal').innerText.replace('TOTAL: ₹', '');
        
        const date = new Date().toLocaleDateString('hi-IN');
        const time = new Date().toLocaleTimeString('hi-IN', {hour: '2-digit', minute:'2-digit'});

        let esc = '\x1B\x40\x1B\x61\x01\x1B\x45\x01KHAN SHOP\n\x1B\x45\x00' + currentStore.toUpperCase() + ' STORE\n--------------------------------\n';
        esc += '\x1B\x61\x00Date: ' + date + ' Time: ' + time + '\nCust: ' + custName.substring(0, 25) + '\n--------------------------------\nItem       Rate    Qty      Amount\n--------------------------------\n';
        esc += '--------------------------------\n';
        for (let key in cart) {
            let item = cart[key];
            let rate = mode === 'retail' ? item.retail : item.ws;
            let subtotal = (rate * item.qty).toString();
            let name = item.eng.substring(0, 14).padEnd(14, ' ');
            let qty = item.qty.toString().padStart(6, ' ');
            let amt = subtotal.padStart(10, ' ');
            esc += `${name}${qty}${amt}\n`;
        }
        esc += '--------------------------------\n\x1B\x61\x02\x1B\x45\x01TOTAL: Rs. ' + totalAmt + '\n\x1B\x45\x00\x1B\x61\x01\nSHUKRIYA! VISIT AGAIN\n\n\n\n';
        const encoder = new TextEncoder();
        await characteristic.writeValue(encoder.encode(esc));
    } catch (error) {
        alert("Printer Connect Nahi Hua!");
        printerDevice = null;
    }
  }
  function downloadCSV() {
    let csv = "Item,Qty,Rate,Subtotal\n";
    for(let k in cart) {
        let r = mode === 'retail' ? cart[k].retail : cart[k].ws;
        csv += `${cart[k].eng},${cart[k].qty},${r},${cart[k].qty*r}\n`;
    }
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `Bill_${currentStore}.csv`; a.click();
  }

  function shareBill() {
    const name = document.getElementById('custName').value || "Valued Customer";
    let text = `*KHAN SHOP (${currentStore.toUpperCase()})*\nDate: ${new Date().toLocaleDateString()}\nCust: ${name}\n----------\n`;
    for(let k in cart) {
        let r = mode === 'retail' ? cart[k].retail : cart[k].ws;
        text += `${cart[k].eng} x ${cart[k].qty} = ₹${cart[k].qty*r}\n`;
    }
    text += `----------\n*Total: ${document.getElementById('grandTotal').innerText}*\nThank You!`;
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
  }
</script>
</body>
</html>
